<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ID Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            color: #1f2937;
            background:
                radial-gradient(circle at top right, rgba(191, 219, 254, 0.55), transparent 30%),
                linear-gradient(135deg, #eef5ff 0%, #f8fbff 48%, #eaf3ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .login-card {
            width: min(100%, 550px);
            padding: 42px 44px 36px;
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid #e4ebf5;
            border-radius: 18px;
            box-shadow: 0 22px 60px rgba(58, 80, 113, 0.16);
        }

        .icon-box {
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            border-radius: 16px;
            background: #dbeafe;
            color: #1d4ed8;
            display: grid;
            place-items: center;
        }

        .icon-box svg {
            width: 34px;
            height: 34px;
            stroke-width: 2.4;
        }

        .heading {
            margin: 0;
            text-align: center;
            font-size: 30px;
            line-height: 1.2;
            font-weight: 800;
            color: #1f2937;
        }

        .subheading {
            margin: 10px 0 34px;
            text-align: center;
            font-size: 17px;
            color: #64748b;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
            font-weight: 700;
            color: #334155;
        }

        input {
            width: 100%;
            height: 54px;
            padding: 0 18px;
            border: 1px solid #dbe3ef;
            border-radius: 11px;
            background: #f1f5f9;
            color: #1e293b;
            font: inherit;
            font-size: 16px;
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease, background 160ms ease;
        }

        input::placeholder {
            color: #64748b;
        }

        input:focus {
            border-color: #2296e8;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(34, 150, 232, 0.14);
        }

        .submit-btn {
            width: 100%;
            height: 54px;
            margin-top: 6px;
            border: 0;
            border-radius: 11px;
            background: #0d94df;
            color: #ffffff;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 10px 22px rgba(13, 148, 223, 0.24);
            transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
        }

        .submit-btn:hover {
            background: #087fca;
            box-shadow: 0 12px 26px rgba(13, 148, 223, 0.32);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .helper-text {
            margin: 24px 0 0;
            text-align: center;
            font-size: 15px;
            color: #94a3b8;
        }

        .helper-text a {
            color: #0d94df;
            font-weight: 700;
            text-decoration: none;
        }

        @media (max-width: 520px) {
            .login-card {
                padding: 34px 22px 30px;
                border-radius: 16px;
            }

            .heading {
                font-size: 27px;
            }
        }
    </style>
</head>

<body>
    <main class="login-card">
        <div class="icon-box" aria-hidden="true">
            <i class="fa-solid fa-id-card"></i>
        </div>

        <h1 class="heading">Welcome Back</h1>
        <p class="subheading">Sign in to manage your ID</p>

        <form action="connect.php" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" placeholder="your username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="........" required>
            </div>

            <button class="submit-btn" type="submit">Sign In</button>
        </form>

        <p class="helper-text">Don't have an account? <a href="#">Sign up</a></p>
    </main>
</body>

</html>
